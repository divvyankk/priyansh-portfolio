/* ---------------- HOOKS ---------------- */

function useSectionObserver(ids, hudSectionRef, setActiveId) {
  useEffect(() => {
    const els = ids.map((id) => document.getElementById(id)).filter(Boolean);
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          setActiveId(entry.target.id);
          if (hudSectionRef.current) hudSectionRef.current.textContent = SECTION_LABELS[entry.target.id] || '';
        }
      });
    }, { rootMargin: '-45% 0px -50% 0px', threshold: 0 });
    els.forEach((el) => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

function useScrollFX(kineticRefsArr) {
  const progressRef = useRef(null);
  const hudBarRef = useRef(null);
  const hudScrollRef = useRef(null);
  const hudClockRef = useRef(null);
  useEffect(() => {
    function updateProgress() {
      const h = document.documentElement;
      const scrolled = h.scrollHeight > h.clientHeight ? (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100 : 0;
      if (progressRef.current) progressRef.current.style.width = scrolled + '%';
      if (hudScrollRef.current) hudScrollRef.current.textContent = scrolled.toFixed(0) + '%';
      if (hudBarRef.current) hudBarRef.current.classList.toggle('translate-y-0', h.scrollTop > window.innerHeight * 0.6);
      if (hudBarRef.current) hudBarRef.current.classList.toggle('translate-y-full', !(h.scrollTop > window.innerHeight * 0.6));
      kineticRefsArr.forEach((r, i) => {
        const el = r.current;
        if (!el) return;
        const dir = i % 2 === 0 ? -1 : 1;
        const offset = (h.scrollTop * 0.12 * dir) % 600;
        el.style.transform = 'translateX(' + offset + 'px)';
      });
    }
    window.addEventListener('scroll', updateProgress, { passive: true });
    updateProgress();
    function updateClock() {
      if (!hudClockRef.current) return;
      const istMillis = Date.now() + 5.5 * 60 * 60000;
      hudClockRef.current.textContent = new Date(istMillis).toISOString().substr(11, 8);
    }
    updateClock();
    const clockInt = setInterval(updateClock, 1000);
    return () => { window.removeEventListener('scroll', updateProgress); clearInterval(clockInt); };
  }, []);
  return { progressRef, hudBarRef, hudScrollRef, hudClockRef };
}

/* ---------------- SHARED COMPONENTS ---------------- */

const Reveal = React.forwardRef(function Reveal({ variant = 'reveal', delay = 0, className = '', as: Tag = 'div', children, ...rest }, forwardedRef) {
  const localRef = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const el = localRef.current;
    if (!el) return;
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) { setInView(true); obs.unobserve(entry.target); }
      });
    }, { threshold: 0.15, rootMargin: '0px 0px -60px 0px' });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  const setRefs = (node) => {
    localRef.current = node;
    if (typeof forwardedRef === 'function') forwardedRef(node);
    else if (forwardedRef) forwardedRef.current = node;
  };
  return (
    <Tag ref={setRefs} className={`${variant} ${inView ? 'in' : ''} ${className}`} style={{ transitionDelay: delay + 'ms' }} {...rest}>
      {children}
    </Tag>
  );
});

const Magnetic = React.forwardRef(function Magnetic({ as: Tag = 'a', className = '', children, ...rest }, forwardedRef) {
  const localRef = useRef(null);
  const setRefs = (node) => {
    localRef.current = node;
    if (typeof forwardedRef === 'function') forwardedRef(node);
    else if (forwardedRef) forwardedRef.current = node;
  };
  const onMove = (e) => {
    const el = localRef.current;
    if (!el) return;
    const r = el.getBoundingClientRect();
    const dx = (e.clientX - r.left - r.width / 2) * 0.28;
    const dy = (e.clientY - r.top - r.height / 2) * 0.35;
    el.style.transform = `translate(${dx}px, ${dy}px)`;
  };
  const onLeave = () => { if (localRef.current) localRef.current.style.transform = ''; };
  return (
    <Tag ref={setRefs} className={`transition-transform duration-150 ${className}`} onMouseMove={onMove} onMouseLeave={onLeave} {...rest}>
      {children}
    </Tag>
  );
});

function PageLoader() {
  const [pct, setPct] = useState(0);
  const [done, setDone] = useState(false);
  useEffect(() => {
    let n = 0, t;
    function step() {
      n += Math.random() * 18 + 6;
      if (n >= 100) n = 100;
      setPct(Math.floor(n));
      if (n < 100) { t = setTimeout(step, 90 + Math.random() * 70); }
      else { t = setTimeout(() => setDone(true), 250); }
    }
    step();
    return () => clearTimeout(t);
  }, []);
  return (
    <div className={`fixed inset-0 z-[3000] bg-bg flex items-center justify-center flex-col gap-3.5 transition-all duration-500 ${done ? 'opacity-0 invisible pointer-events-none' : ''}`}>
      <div className="font-anton text-[15px] tracking-[4px] text-fire2">{pct}%</div>

      </div>
    </div>
  );
}

function CustomCursor() {
  const dotRef = useRef(null);
  const ringRef = useRef(null);
  useEffect(() => {
    if (!window.matchMedia('(pointer:fine)').matches) return;
    document.body.classList.add('has-cursor');
    let tx = 0, ty = 0, rx = 0, ry = 0, raf;
    function onMove(e) {
      tx = e.clientX; ty = e.clientY;
      if (dotRef.current) { dotRef.current.style.left = tx + 'px'; dotRef.current.style.top = ty + 'px'; }
    }
    window.addEventListener('mousemove', onMove);
    function loop() {
      rx += (tx - rx) * 0.18; ry += (ty - ry) * 0.18;
      if (ringRef.current) { ringRef.current.style.left = rx + 'px'; ringRef.current.style.top = ry + 'px'; }
      raf = requestAnimationFrame(loop);
    }
    loop();
    function onOver(e) {
      if (e.target.closest && e.target.closest('a, button, .wof-card, .reel-card, .chip')) {
        if (ringRef.current) { ringRef.current.classList.add('w-14', 'h-14'); ringRef.current.classList.remove('w-8', 'h-8'); }
      }
    }
    function onOut(e) {
      if (e.target.closest && e.target.closest('a, button, .wof-card, .reel-card, .chip')) {
        if (ringRef.current) { ringRef.current.classList.remove('w-14', 'h-14'); ringRef.current.classList.add('w-8', 'h-8'); }
      }
    }
    document.addEventListener('mouseover', onOver);
    document.addEventListener('mouseout', onOut);
    return () => {
      window.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseover', onOver);
      document.removeEventListener('mouseout', onOut);
      cancelAnimationFrame(raf);
      document.body.classList.remove('has-cursor');
    };
  }, []);
  return (
    <>
      <div ref={dotRef} className="cursor-dot fixed top-0 left-0 w-[7px] h-[7px] rounded-full bg-fire2 pointer-events-none z-[1500] -translate-x-1/2 -translate-y-1/2 opacity-0 transition-opacity duration-300"></div>

function StatsBar() {
  const containerRef = useRef(null);
  const numRefs = useRef([]);
  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          STATS.forEach((s, i) => {
            const node = numRefs.current[i];
            if (!node) return;
            const dur = 1400; let start = null;
            function step(ts) {
              if (!start) start = ts;
              const progress = Math.min((ts - start) / dur, 1);
              const eased = 1 - Math.pow(1 - progress, 3);
              const val = s.target * eased;
              node.textContent = s.decimals > 0 ? val.toFixed(s.decimals) : Math.round(val);
              if (progress < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
          });
          obs.unobserve(entry.target);
        }
      });
    }, { threshold: 0.4 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={containerRef} className="grid grid-cols-1 sm:grid-cols-3 border border-line rounded-[10px] overflow-hidden mt-14">
      {STATS.map((s, i) => (
        <div key={s.label} className="p-6 text-center border-b sm:border-b-0 sm:border-r border-line last:border-none">
          <div className="font-anton text-[clamp(24px,4vw,34px)] text-fire2">
            <span ref={(el) => (numRefs.current[i] = el)}>0</span><span className="text-sm text-muted font-sans">{s.unit}</span>
          </div>
          <div className="mt-1.5 text-[11px] tracking-[2px] uppercase text-muted">{s.label}</div>
        </div>
      ))}
    </div>
  );
}
